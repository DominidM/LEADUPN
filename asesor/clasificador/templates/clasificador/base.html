<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesor Financiero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f8;
            color: #1a202c;
        }

        /* NAVBAR */
        nav {
            background: #1a365d;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        nav .logo {
            color: white;
            font-size: 1.2em;
            font-weight: 700;
            letter-spacing: 1px;
        }
        nav .logo span { color: #63b3ed; }
        nav ul {
            list-style: none;
            display: flex;
            gap: 8px;
        }
        nav ul li a {
            color: #cbd5e0;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9em;
            transition: background 0.2s, color 0.2s;
        }
        nav ul li a:hover, nav ul li a.active {
            background: #2b6cb0;
            color: white;
        }

        /* CONTENIDO */
        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* TARJETAS */
        .card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .card h2 {
            font-size: 1.4em;
            color: #1a365d;
            margin-bottom: 8px;
        }
        .card p.subtitle {
            color: #718096;
            font-size: 0.9em;
            margin-bottom: 24px;
        }

        /* FORMULARIOS */
        label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 4px;
        }
        input[type=text], input[type=number], select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95em;
            margin-bottom: 16px;
            transition: border 0.2s;
            background: #f7fafc;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2b6cb0;
            background: white;
        }
        input[type=checkbox] { width: auto; margin-right: 8px; }

        .btn {
            background: #2b6cb0;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        .btn:hover { background: #1a365d; }

        /* RESULTADO */
        .resultado-box {
            background: #ebf8ff;
            border-left: 4px solid #2b6cb0;
            border-radius: 8px;
            padding: 20px;
            margin-top: 24px;
        }
        .resultado-box h3 { color: #1a365d; margin-bottom: 12px; }
        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 700;
        }
        .badge-credito  { background: #fed7d7; color: #c53030; }
        .badge-salud    { background: #fefcbf; color: #b7791f; }
        .badge-laboral  { background: #feebc8; color: #c05621; }
        .badge-supply   { background: #c6f6d5; color: #276749; }

        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th { background: #2b6cb0; color: white; padding: 10px; text-align: center; }
        td { padding: 9px 12px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        tr:last-child td { border-bottom: none; }

        .error { color: #c53030; background: #fff5f5; border-left: 4px solid #fc8181;
                 padding: 12px 16px; border-radius: 8px; margin-top: 20px; }

        .back-link { display: inline-block; margin-top: 20px; color: #2b6cb0;
                     text-decoration: none; font-size: 0.9em; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Asesor <span>Financiero</span></div>
        <ul>
            <li><a href="/">📝 Clasificar</a></li>
            <li><a href="/lista/">📋 Registros</a></li>
        </ul>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
