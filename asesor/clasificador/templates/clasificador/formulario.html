<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asesor Financiero</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        input, select { width: 100%; padding: 8px; margin: 6px 0 16px; box-sizing: border-box; }
        button { background: #2c7be5; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Clasificador de Riesgo Financiero</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Clasificar</button>
    </form>
</body>
</html>
