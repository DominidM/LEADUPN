{% extends "clasificador/base.html" %}
{% block content %}
<div class="card">
    <h2>🐦 Migratory Birds</h2>
    <p class="subtitle">Ingresa los avistamientos separados por espacios (tipos 1–5)</p>
    <form method="post">
        {% csrf_token %}
        <label>Avistamientos</label>
        <input type="text" name="avistamientos" placeholder="Ej: 1 2 3 1 2 1 5" required>
        <button type="submit" class="btn">Analizar →</button>
    </form>
    {% if resultado %}
    <div class="resultado-box">
        <h3>Tipo más frecuente: <strong>Tipo {{ resultado }}</strong></h3>
    </div>
    {% endif %}
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
</div>
{% endblock %}
